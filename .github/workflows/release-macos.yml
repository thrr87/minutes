name: Release macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  CXXFLAGS: -I$(xcrun --show-sdk-path)/usr/include/c++/v1
  TAURI_CLI_VERSION: "2.10.1"

jobs:
  macos-release:
    name: Build signed + notarized Minutes.app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "${TAURI_CLI_VERSION}" --locked

      - name: Validate signing and notarization secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_PRIVATE_KEY
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required release secrets: ${missing[*]}" >&2
            echo "See docs/RELEASE-MACOS.md for the expected values." >&2
            exit 1
          fi

      - name: Materialize App Store Connect key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Generate release-note draft
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            channel="preview"
          else
            channel="stable"
          fi

          if previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null)"; then
            from_ref="$previous_tag"
          else
            from_ref="$(git rev-list --max-parents=0 HEAD)"
          fi

          chmod +x scripts/release_notes.sh
          scripts/release_notes.sh "$from_ref" "${GITHUB_SHA}" "$channel" > "$RUNNER_TEMP/release-notes.md"

      - name: Build signed + notarized bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: cargo tauri build --bundles app,dmg

      - name: Upload signed app bundle
        uses: actions/upload-artifact@v4
        with:
          name: minutes-macos-app
          path: target/release/bundle/macos/Minutes.app
          if-no-files-found: error

      - name: Upload signed dmg
        uses: actions/upload-artifact@v4
        with:
          name: minutes-macos-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Attach release assets on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ runner.temp }}/release-notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            target/release/bundle/dmg/*.dmg
